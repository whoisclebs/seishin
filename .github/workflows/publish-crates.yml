name: Publish Crates

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish, or all packages in dependency order.
        required: true
        default: all
        type: choice
        options:
          - all
          - seishin_core
          - seishin_input
          - seishin_assets
          - seishin_audio
          - seishin_physics
          - seishin_render_graph
          - seishin_world
          - seishin_render
          - seishin_runtime
          - seishin_ffi
          - seishin
      dry_run:
        description: Run cargo publish with --dry-run.
        required: true
        default: true
        type: boolean
  release:
    types: [published]

jobs:
  publish:
    name: Publish crates.io packages
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
      PACKAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.package || 'all' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Validate workspace
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace --all-targets
          cargo build --workspace
          cargo build --target wasm32-unknown-unknown -p seishin_basic_2d

      - name: Ensure publish token is configured
        if: ${{ env.DRY_RUN != 'true' }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "CARGO_REGISTRY_TOKEN is not configured." >&2
            exit 1
          fi

      - name: Publish selected crates
        run: |
          set -euo pipefail

          packages=(
            seishin_core
            seishin_input
            seishin_assets
            seishin_audio
            seishin_physics
            seishin_render_graph
            seishin_world
            seishin_render
            seishin_runtime
            seishin_ffi
            seishin
          )

          if [ "$PACKAGE" != "all" ]; then
            packages=("$PACKAGE")
          fi

          publish_args=(--locked)
          if [ "$DRY_RUN" = "true" ]; then
            publish_args+=(--dry-run)
          fi

          for package in "${packages[@]}"; do
            cargo publish -p "$package" "${publish_args[@]}"

            if [ "$DRY_RUN" != "true" ] && [ "$package" != "${packages[-1]}" ]; then
              sleep 30
            fi
          done

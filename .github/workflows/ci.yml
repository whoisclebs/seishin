name: CI

permissions:
  contents: read

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  rust:
    name: Rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Web Target
        if: runner.os == 'Linux'
        run: rustup target add wasm32-unknown-unknown

      - name: Install Android Target
        if: runner.os == 'Linux'
        run: rustup target add aarch64-linux-android

      - name: Install iOS Target
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-ios

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace --all-targets

      - name: Build
        run: cargo build --workspace

      - name: Build Web Example
        if: runner.os == 'Linux'
        run: cargo build --target wasm32-unknown-unknown -p seishin_basic_2d

      - name: Check Android Runtime
        if: runner.os == 'Linux'
        run: cargo check --target aarch64-linux-android -p seishin --no-default-features --features android

      - name: Check iOS Runtime
        if: runner.os == 'macOS'
        run: cargo check --target aarch64-apple-ios -p seishin --no-default-features --features ios
